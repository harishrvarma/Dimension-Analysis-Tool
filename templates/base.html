<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}1Stopbedroom Dashboard{% endblock %}</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d7dfec;
      --brand: #1d4ed8;
      --brand-hover: #1e40af;
      --active: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }
    .top-menu {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .brand {
      font-weight: 700;
      font-size: 15px;
      color: var(--brand);
      min-width: 200px;
    }
    .links {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .links a, .dropdown-toggle {
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      padding-bottom: 4px;
    }
    .links a:hover, .dropdown-toggle:hover {
      border-bottom-color: var(--brand);
    }
    .links a.active, .dropdown-toggle.active {
      border-bottom-color: var(--active);
      color: var(--active);
    }
    .dropdown {
      position: relative;
    }
    .dropdown-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      left: auto;
      margin-top: 8px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      min-width: 180px;
      padding: 8px 0;
    }
    .dropdown-menu.show {
      display: block;
    }
    .dropdown-menu a {
      display: block;
      padding: 8px 16px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      border-bottom: none;
    }
    .dropdown-menu a:hover {
      background: #f3f4f6;
      border-bottom: none;
    }
    .page {
      padding: 18px 20px;
    }
    .center-body {
      min-height: calc(100vh - 90px);
      display: grid;
      place-items: center;
      text-align: center;
    }
    .center-body h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .app-frame {
      width: 100%;
      height: calc(100vh - 90px);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }
  </style>
</head>
<body>
  <nav class="top-menu">
    <div class="brand" id="brandTitle">1Stopbedroom</div>
    <div class="links">
      <a href="/" class="{% if active_page == 'home' %}active{% endif %}" onclick="updateBrand('1Stopbedroom')">Home</a>
      
      <div class="dropdown">
        <div class="dropdown-toggle {% if active_page in ['dimension_analyzer', 'dimension_report'] %}active{% endif %}" onclick="toggleDropdown(event, 'dimensionDropdown', 'dimensionArrow')">
          Dimension
        </div>
        <div class="dropdown-menu" id="dimensionDropdown">
          <a href="/dimension/analyzer" onclick="updateBrand('Dimension Analyzer')">Analyzer</a>
          <a href="/dimension/report" onclick="updateBrand('Dimension Report')">Report</a>
        </div>
      </div>
      
      <div class="dropdown">
        <div class="dropdown-toggle {% if active_page in ['item_match', 'matching_items'] %}active{% endif %}" onclick="toggleDropdown(event, 'priceMatchDropdown', 'priceMatchArrow')">
          Price Match
        </div>
        <div class="dropdown-menu" id="priceMatchDropdown">
          <a href="/item-match" onclick="updateBrand('Price Match Analyzer')">Analyzer</a>
          <a href="/matching-items" onclick="updateBrand('Matching Items Grid')">Report</a>
        </div>
      </div>
      
      <div class="dropdown">
        <div class="dropdown-toggle {% if active_page in ['import'] %}active{% endif %}" onclick="toggleDropdown(event, 'databaseDropdown', 'databaseArrow')">
          Database
        </div>
        <div class="dropdown-menu" id="databaseDropdown">
          <a href="/import" onclick="updateBrand('Database Import')">Import</a>
        </div>
      </div>
      

    </div>
  </nav>

  <main class="page">
    {% block content %}{% endblock %}
  </main>
  
  <script>
    function updateBrand(title) {
      document.getElementById('brandTitle').textContent = title;
    }
    
    function toggleDropdown(event, dropdownId, arrowId) {
      event.stopPropagation();
      const dropdown = document.getElementById(dropdownId);
      const arrow = document.getElementById(arrowId);
      
      // Close all other dropdowns
      document.querySelectorAll('.dropdown-menu').forEach(menu => {
        if (menu.id !== dropdownId) {
          menu.classList.remove('show');
        }
      });
      document.querySelectorAll('.dropdown-menu').forEach((menu, index) => {
        const arrows = ['dimensionArrow', 'priceMatchArrow', 'databaseArrow'];
        arrows.forEach(arrowId => {
          const arrowEl = document.getElementById(arrowId);
          if (arrowEl && menu.id !== dropdownId) {
            arrowEl.textContent = '';
          }
        });
      });
      
      dropdown.classList.toggle('show');
      arrow.textContent = dropdown.classList.contains('show') ? '' : '';
    }
    
    // Close dropdown when clicking outside
    document.addEventListener('click', function(event) {
      if (!event.target.closest('.dropdown')) {
        document.querySelectorAll('.dropdown-menu').forEach(menu => {
          menu.classList.remove('show');
        });
        ['dimensionArrow', 'priceMatchArrow', 'databaseArrow'].forEach(arrowId => {
          const arrow = document.getElementById(arrowId);
          if (arrow) arrow.textContent = '';
        });
      }
    });
    
    // Set initial brand title based on active page
    document.addEventListener('DOMContentLoaded', function() {
      const activePage = '{{ active_page }}';
      const titleMap = {
        'home': '1Stopbedroom',
        'dimension_analyzer': 'Dimension Analyzer',
        'dimension_report': 'Dimension Report',
        'item_match': 'Price Match Analyzer',
        'matching_items': 'Price Match Report',
        'import': 'Database Import',
        'carton_analyzer': 'Carton Analyzer',
        'carton_report': 'Carton Report'
      };
      if (titleMap[activePage]) {
        updateBrand(titleMap[activePage]);
      }
    });
  </script>
</body>
</html>

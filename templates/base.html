<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}1Stopbedroom Dashboard{% endblock %}</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d7dfec;
      --brand: #1d4ed8;
      --brand-hover: #1e40af;
      --active: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }
    .top-menu {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .brand {
      font-weight: 700;
      font-size: 15px;
      color: var(--brand);
    }
    .links {
      display: flex;
      gap: 10px;
    }
    .links a {
      text-decoration: none;
      color: #ffffff;
      background: var(--brand);
      border: 1px solid var(--brand);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .links a:hover {
      background: var(--brand-hover);
      border-color: var(--brand-hover);
    }
    .links a.active {
      background: var(--active);
      border-color: var(--active);
    }
    .page {
      padding: 18px 20px;
    }
    .center-body {
      min-height: calc(100vh - 90px);
      display: grid;
      place-items: center;
      text-align: center;
    }
    .center-body h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .app-frame {
      width: 100%;
      height: calc(100vh - 90px);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }
  </style>
</head>
<body>
  <nav class="top-menu">
    <div class="brand">1Stopbedroom</div>
    <div class="links">
      <a href="/" class="{% if active_page == 'home' %}active{% endif %}">Home</a>
      <a href="/grid" class="{% if active_page == 'grid' %}active{% endif %}">Grid</a>
      <a href="/dimension/analyzer" class="{% if active_page == 'analyzer' %}active{% endif %}">Analyzer</a>
      <a href="/import" class="{% if active_page == 'import' %}active{% endif %}">Import</a>
    </div>
  </nav>

  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
